<ion-content>
  <div class="bookings-wrapper" style="padding: 20px; background-color:#f4f4f4;">

    <div class="action-btn-container" style="padding: 20px 0; display: flex; gap: 15px;">
      <p (click)="goBack()" style="font-size: 35px; font-weight: bold; color:#3498db; position: relative; bottom:10px;;"> < </p>
    <div>
      <p style="position: relative; top: 5px; font-size: 25px; color:#3498db; font-weight: bold;">Maintenance Requests</p>
      <p style="font-size: 14px; color: #666;">View and manage maintenance requests for the halls</p>
     </div>
    </div>

    <div class="search-bar" style="padding: 22px;">
      <input type="search" placeholder="Search for requests">
      <button>Search</button>
    </div>
    <!-- 🏷 Header Branding -->
    <div class="header">
      <div class="logo-brand" style="display: flex; gap:5px;">
        <div class="logo-dot" style="position: relative; top:7px;"></div>
        <span class="logo-text" style="color:#3498db; font-weight: bold; font-size:18px;">hallPass</span>
      </div>
      <p class="subtitle">Manage and resolve halls maintenance issues</p>
    </div>
    <!-- 🧰 Maintenance Cards -->
    <div class="booking-feed">
    <div class="booking-card" *ngFor="let request of requests" style="margin-bottom: 20px;">
    <div style="padding: 15px;">
      <h3 style="margin-bottom: 8px;">{{ request.title }}</h3>
      <p style="font-size: 14px; color: #666;">{{ request.description }}</p>
      <p style="font-size: 13px; color: #999; margin-top: 10px;"> 📍 {{ request.location }} | 🧍 {{ request.reporter }} </p>
      <p style="font-size: 12px; color: #bbb;">🕒 {{ request.date }}</p>
      <div style="margin-top: 15px; display: flex; justify-content: flex-end; gap: 10px;" *ngIf="userRole==='Municipality'">
        <ion-button fill="outline" color="success" size="small" >Fixed</ion-button>
        <ion-button fill="outline" color="warning" size="small" >In-Progress</ion-button>
        <ion-button fill="outline" color="danger" size="small" >Decline</ion-button>
      </div>
    </div>
  </div>
</div>
  </div>
</ion-content>
