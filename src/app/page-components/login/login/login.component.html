<div class="auth-page">

  <div class="auth-container">

    <!-- LEFT / TOP BRAND -->
    <div class="brand">
      <i class="fa fa-calendar icon"></i>
      <h1>HallPass</h1>
      <p>{{ sentences[currentIndex] }}</p>
    </div>

    <!-- LOGIN CARD -->
    <div class="auth-card">

      <h2>Welcome Back 👋</h2>
      <p class="subtitle">Login to continue</p>

      <form [formGroup]="loginForm" (ngSubmit)="onLogin()">

        <div class="form-group">
          <label>Email</label>
          <input type="email" formControlName="email" placeholder="Enter your email">
        </div>

        <div *ngIf="loginForm.controls.email.invalid && loginForm.controls.email.touched" class="error">
          Valid email is required
        </div>

        <div class="form-group password-group">
          <label>Password</label>
          <input [type]="showPassword ? 'text' : 'password'"
                 formControlName="password"
                 placeholder="Enter your password">

          <i class="fa"
             [class.fa-eye]="!showPassword"
             [class.fa-eye-slash]="showPassword"
             (click)="togglePasswordVisibility()">
          </i>
        </div>

        <div *ngIf="loginForm.controls.password.invalid && loginForm.controls.password.touched" class="error">
          Password is required
        </div>

        <button class="login-btn" type="submit" [disabled]="loginForm.invalid">
          Login
        </button>

      </form>

      <div class="extra-links">
        <span (click)="navigate('/reset-password')">Forgot password?</span>
      </div>

      <div class="divider">or</div>

      <button class="register-btn" (click)="navigate('/register')">
        Create Account
      </button>

    </div>

  </div>

</div>
